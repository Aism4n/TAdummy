author: "PatapoIIIa"
delete-after: True
changes:
  - refactor: "Вампирский код Twilight Axis вынесен в локальный модульный слой."
  - code_imp: "Добавлены локальные vampire define, cleanup undefine и override-файлы для основных вампирских механик."
  - balance: "Переработана экономика RP, лимиты порождений, цена обращения и покупка уровней ковенов."
  - balance: "Прокачка ковенов через XP отключена; уровни ковенов теперь покупаются за Vitae и RP."
  - balance: "Переработано кровопитие, высасывание Vitae, смертельное питье и диаблерия."
  - balance: "Добавлены добровольное обращение, насильственное обращение и иссушение через Дар смерти."
  - balance: "Насильственное обращение теперь доступно только вампир-лорду."
  - balance: "Добавлены Pallid-иссушение, Дары смерти и лимиты Даров смерти по поколению."
  - balance: "Добавлены возвышенные ковены и новые силы 6 уровня для вампир-лордов."
  - balance: "Transfix переработан: длина фразы, анти-копипаста, наказание за злоупотребление, серебряные проверки и обрыв при побеге цели."
  - balance: "Серебро теперь может прерывать ярость Дара берсерка."
  - qol: "Добавлены более понятные сообщения для обращения, иссушения, Pallid, Даров смерти и Transfix."
  - qol: "Добавлена русская локализация вампирского UI и поддержка русского UI-языка."
  - qol: "Добавлен интерфейс вампирских Врат разлома."
  - bugfix: "Исправлены DreamChecker-ошибки Дара берсерка, связанные с блокирующими вызовами в signal-handler."
  - bugfix: "Исправлен Transfix, который мог сработать после побега цели слишком далеко."